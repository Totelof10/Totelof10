events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # --- AJOUTEZ OU MODIFIEZ CETTE LIGNE ---
    client_max_body_size 20M; # Défini à 20 Mégaoctets (ou une taille adaptée à vos besoins)
    # ---------------------------------------

    server {
        listen 80;
        server_name localhost; # Ou l'IP de votre machine si vous y accédez par IP

        root /usr/share/nginx/html; # Chemin où sont les fichiers statiques de React

        # Directive pour servir les fichiers statiques de React et gérer le routage SPA
        location / {
            try_files $uri $uri/ /index.html;
        }


        # Nouvelle directive pour proxifier les requêtes GraphQL vers le backend
        # Assurez-vous que votre frontend appelle bien /graphql
        location /graphql {
            # Utilise le nom du service Docker Compose 'backend' pour la communication interne
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Gérer les requêtes OPTIONS (preflight CORS) si nécessaire
            # Si Spring Boot gère déjà bien CORS, Nginx n'a qu'à forwarder.
            # Mais si Nginx bloque les OPTIONS, décommentez et ajustez ceci:
            # if ($request_method = 'OPTIONS') {
            #     add_header 'Access-Control-Allow-Origin' '*'; # À affiner pour la production
            #     add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
            #     add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
            #     add_header 'Access-Control-Max-Age' 1728000;
            #     add_header 'Content-Type' 'text/plain; charset=utf-8';
            #     add_header 'Content-Length' 0;
            #     return 204;
            # }
        }

        # Si vous avez d'autres endpoints REST (ex: /api/login, /api/users), ajoutez une location similaire:
         location /api/ {
             proxy_pass http://backend:8080;
             proxy_set_header Host $host;
             proxy_set_header X-Real-IP $remote_addr;
             proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
             proxy_set_header X-Forwarded-Proto $scheme;
         }

        # Proxy pour les images
        location /images/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}